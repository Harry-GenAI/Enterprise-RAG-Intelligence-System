name: ERIS CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
        IMAGE=${{ secrets.DOCKER_USERNAME }}/eris-version:${{ github.run_number }}
        echo "IMAGE=$IMAGE" >> $GITHUB_ENV
        docker build -t $IMAGE -t ${{ secrets.DOCKER_USERNAME }}/eris-version:latest .
        docker push $IMAGE

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/eris-version:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/eris-version:${{ github.run_number }}

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/eris-version:${{ github.run_number }}

          echo "Pulling latest image..."
          docker pull $IMAGE

          echo "Stopping old container..."
          docker stop eris-container || true
          docker rm eris-container || true

          echo "Running new container..."
          docker run -d \
            --name eris-container \
            --env-file .env \
            -p 8000:8000 \
            $IMAGE

          echo "Deployment complete 🚀"